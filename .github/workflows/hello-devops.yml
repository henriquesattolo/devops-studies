name: Hello DevOps - Meu Primeiro Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  hello:
    runs-on: ubuntu-latest
    steps:
      - name: 1 - Checkout do repositório
        uses: actions/checkout@v4

      - name: 2 - Exibir info do ambiente
        run: |
          echo "Rodando no runner: $RUNNER_OS"
          echo "Branch: $GITHUB_REF_NAME"
          echo "Disparado por: $GITHUB_ACTOR"

      - name: 3 - Verificar versões instaladas
        run: |
          git --version
          docker --version
          python3 --version

      - name: 4 - Criar artefato
        run: |
          mkdir output
          echo "Build gerado em: $(date)" > output/build-info.txt
          echo "Commit: $GITHUB_SHA" >> output/build-info.txt

      - name: 5 - Upload do artefato
        uses: actions/upload-artifact@v4
        with:
          name: build-info
          path: output/

  docker:
    runs-on: ubuntu-latest
    needs: hello
    steps:
      - name: 1 - Checkout do repositório
        uses: actions/checkout@v4

      - name: 2 - Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 3 - Build e Push Docker Hub
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-studies:latest \
                       -t ${{ secrets.DOCKER_USERNAME }}/devops-studies:${{ github.sha }} .
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-studies:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-studies:${{ github.sha }}

  deploy-aws:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: 1 - Checkout do repositório
        uses: actions/checkout@v4

      - name: 2 - Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: 3 - Login no Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 4 - Build e Push para ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: devops-studies
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
                       -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "Imagem publicada: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
